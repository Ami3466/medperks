services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: care
      POSTGRES_PASSWORD: care
      POSTGRES_DB: care_companion
    volumes:
      - care-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U care -d care_companion"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./api
    environment:
      PORT: 3000
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      DATABASE_URL: postgres://care:care@db:5432/care_companion
      VIDEO_STORAGE_DIR: /app/storage/videos
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - care-videos:/app/storage/videos
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  web:
    build:
      context: ./caregiver
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  care-db:
  care-videos:
